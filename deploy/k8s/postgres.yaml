apiVersion: v1
kind: Namespace
metadata:
  name: data
---
# postgres-secret is NOT defined here on purpose — a Secret's value would be a
# plaintext password committed to git. Create it once, before applying this
# file, sourced from a shell variable (docs/dev-stage-minikube-runbook.md §1):
#   POSTGRES_PASSWORD="${POSTGRES_PASSWORD:-dev}" && \
#   kubectl create secret generic postgres-secret -n data \
#     --from-literal=POSTGRES_PASSWORD="$POSTGRES_PASSWORD" \
#     --dry-run=client -o yaml | kubectl apply -f -
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: data
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: data
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: docker.io/library/postgres:17
          env:
            - { name: POSTGRES_DB, value: snoopy_home }
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef: { name: postgres-secret, key: POSTGRES_PASSWORD }
            - { name: PGDATA, value: /var/lib/postgresql/data/pgdata }
          ports:
            - { name: postgres, containerPort: 5432 }
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "postgres"] }
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec: { command: ["pg_isready", "-U", "postgres"] }
            initialDelaySeconds: 15
            periodSeconds: 15
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: postgres-data }
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: data
spec:
  selector: { app: postgres }
  ports:
    - { port: 5432, targetPort: 5432 }

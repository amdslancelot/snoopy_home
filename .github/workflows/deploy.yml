name: CI / Deploy

on:
  push:
    branches: [main]      # runs tests only
    tags: ["v*"]          # tests + prod deploy
  pull_request:
    branches: [main]

jobs:
  # ── 1. Unit + DB integration tests (fast, no API calls) ──────────────────────
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: snoopy_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt -r requirements-test.txt

      - name: Run tests
        run: pytest tests/unit/ tests/integration/test_database.py -v
        env:
          DISCORD_TOKEN: test-discord-token
          GEMINI_API_KEY: test-gemini-api-key
          TEST_DATABASE_URL: postgresql://postgres:test@localhost:5432/snoopy_test

  # ── 2. SSH → git pull → build → restart (only on a v* tag) ──────────────────
  # Prod deploys are release-gated: push to main runs tests, but a bot only
  # reaches the OCI VM when you cut a version tag (e.g. `git tag v1.0.0 && git
  # push --tags`). Keeps every merge to main off prod.
  deploy:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Pull code and redeploy
        uses: appleboy/ssh-action@v1.0.3
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        with:
          host: ${{ secrets.OCI_VM_HOST }}
          username: ${{ secrets.OCI_VM_USER }}
          key: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          envs: GH_TOKEN,GH_REPO
          script: |
            cd ~/snoopy_home
            git pull https://x-access-token:${GH_TOKEN}@github.com/${GH_REPO}.git main
            podman build -t snoopy-home:latest .
            systemctl --user stop snoopy-home 2>/dev/null || true
            podman ps -q --filter ancestor=localhost/snoopy-home:latest | xargs -r podman stop
            systemctl --user reset-failed snoopy-home 2>/dev/null || true
            systemctl --user start snoopy-home
            podman image prune -f

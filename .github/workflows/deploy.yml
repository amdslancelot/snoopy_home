name: CI / Deploy

on:
  push:
    branches: [main]      # runs tests only
    tags: ["v*"]          # tests + prod deploy
  pull_request:
    branches: [main]

jobs:
  # ── 1. Unit + DB integration tests (fast, no API calls) ──────────────────────
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: snoopy_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt -r requirements-test.txt

      - name: Run tests
        run: pytest tests/unit/ tests/integration/test_database.py -v
        env:
          DISCORD_TOKEN: test-discord-token
          GEMINI_API_KEY: test-gemini-api-key
          TEST_DATABASE_URL: postgresql://postgres:test@localhost:5432/snoopy_test

  # ── 2. SSH → build on node → import into containerd → apply -k (only on a v* tag) ─
  # Prod deploys are release-gated: push to main runs tests, but a bot only
  # reaches the OCI k3s node when you cut a version tag (e.g. `git tag v1.0.0 &&
  # git push --tags`). Keeps every merge to main off prod.
  #
  # No registry at this scale: the image is built on the node with Podman and
  # imported into k3s's containerd, then referenced by its sha tag with
  # imagePullPolicy: Never. `apply -k` runs BEFORE `set image`, every deploy —
  # the overlay pins no tag, so applying it alone would revert the pod to the
  # `:latest` placeholder. The sha is applied imperatively as the last step.
  #
  # Node prerequisites (one-time, see docs/prod-provisioning.md):
  #   - repo cloned at ~/snoopy_home; git, podman installed
  #   - `kubectl` usable by the SSH user (k3s kubeconfig at ~/.kube/config)
  #   - passwordless sudo for `k3s ctr images import`
  #   - namespace `snoopy` + secret `snoopy-secrets` + shared Postgres (data ns) exist
  deploy:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Build on node and roll out to k3s
        uses: appleboy/ssh-action@v1.0.3
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          GH_SHA: ${{ github.sha }}
          GH_REF: ${{ github.ref_name }}
        with:
          host: ${{ secrets.OCI_VM_HOST }}
          username: ${{ secrets.OCI_VM_USER }}
          key: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          envs: GH_TOKEN,GH_REPO,GH_SHA,GH_REF
          script: |
            set -euo pipefail
            cd ~/snoopy_home
            # Check out the exact tagged commit (build once, deploy that sha).
            git fetch --force https://x-access-token:${GH_TOKEN}@github.com/${GH_REPO}.git \
              "refs/tags/${GH_REF}:refs/tags/${GH_REF}"
            git checkout --force "refs/tags/${GH_REF}"
            SHA=${GH_SHA:0:7}
            IMG=localhost/snoopy-home:${SHA}
            podman build -t "${IMG}" .
            # full path: sudo's secure_path excludes /usr/local/bin, and it
            # matches the NOPASSWD sudoers rule (/usr/local/bin/k3s) exactly
            podman save "${IMG}" | sudo /usr/local/bin/k3s ctr images import -
            kubectl apply -k deploy/k8s/overlays/prod
            kubectl -n snoopy set image deploy/snoopy snoopy="${IMG}"
            kubectl -n snoopy rollout status deploy/snoopy --timeout=120s
            podman image prune -f
